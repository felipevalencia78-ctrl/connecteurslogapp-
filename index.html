<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Application éducative pour pratiquer les connecteurs logiques en français."
    />
    <title>Les Connecteurs Logiques</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="practice-panel" aria-labelledby="appTitle">
        <header class="topbar">
          <div>
            <p class="eyebrow">Français B1</p>
            <h1 id="appTitle">Les connecteurs logiques</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span id="scoreValue">0/6</span>
            <span>bonnes réponses</span>
          </div>
        </header>

        <section class="word-bank" aria-labelledby="wordBankTitle">
          <div class="section-heading">
            <h2 id="wordBankTitle">Complétez le texte avec</h2>
            <button id="hintButton" class="icon-button" type="button" aria-label="Voir un indice" title="Voir un indice">
              ?
            </button>
          </div>
          <div id="wordBank" class="chips" aria-label="Banque de connecteurs"></div>
        </section>

        <section class="exercise-area" aria-label="Exercice">
          <div id="sentences" class="text-exercise"></div>
        </section>

        <section class="feedback-strip" aria-live="polite">
          <div>
            <strong id="feedbackTitle">Choisissez un connecteur.</strong>
            <p id="feedbackText">Sélectionnez un mot dans la banque, puis cliquez sur un espace vide.</p>
          </div>
          <div class="progress-track" aria-label="Progression">
            <span id="progressBar"></span>
          </div>
        </section>

        <footer class="actions">
          <button id="resetButton" class="ghost-button" type="button">Recommencer</button>
          <button id="checkButton" class="primary-button" type="button">Vérifier</button>
        </footer>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
