<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aplicacion educativa para practicar los connecteurs logiques en frances."
    />
    <title>Les Connecteurs Logiques</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="practice-panel" aria-labelledby="appTitle">
        <header class="topbar">
          <div>
            <p class="eyebrow">Frances B1</p>
            <h1 id="appTitle">Les connecteurs logiques</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span id="scoreValue">0/8</span>
            <span>aciertos</span>
          </div>
        </header>

        <section class="word-bank" aria-labelledby="wordBankTitle">
          <div class="section-heading">
            <h2 id="wordBankTitle">Completez avec</h2>
            <button id="hintButton" class="icon-button" type="button" aria-label="Ver una pista" title="Ver una pista">
              ?
            </button>
          </div>
          <div id="wordBank" class="chips" aria-label="Banco de conectores"></div>
        </section>

        <section class="exercise-area" aria-label="Ejercicio">
          <ol id="sentences" class="sentences"></ol>
        </section>

        <section class="feedback-strip" aria-live="polite">
          <div>
            <strong id="feedbackTitle">Elige un conector.</strong>
            <p id="feedbackText">Selecciona una palabra del banco y luego toca un espacio en blanco.</p>
          </div>
          <div class="progress-track" aria-label="Progreso">
            <span id="progressBar"></span>
          </div>
        </section>

        <footer class="actions">
          <button id="resetButton" class="ghost-button" type="button">Reiniciar</button>
          <button id="checkButton" class="primary-button" type="button">Comprobar</button>
        </footer>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
